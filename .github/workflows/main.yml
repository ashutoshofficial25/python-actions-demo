name: Python Install Demo

on: 
  workflow_dispatch:

jobs:
  python-demo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install Python 3.1
        uses: actions/setup-python@v5
        with:
          python-verion: '3.11'
      - name: check python version
        run: python --version

      - name: Run python file
        run: python app.py

  
        
